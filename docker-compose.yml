services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      BACKEND_PROXY_TARGET: http://backend:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-workbrew}:${POSTGRES_PASSWORD:-workbrew}@postgres:5432/${POSTGRES_DB:-workbrew}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
